name: Generate CNCF Missions
on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:
    inputs:
      projects:
        description: 'Comma-separated CNCF project names (empty = all in batches)'
        required: false
      min_reactions:
        description: 'Minimum reactions threshold'
        required: false
        default: '10'
      batch_size:
        description: 'Projects per batch'
        required: false
        default: '20'
      dry_run:
        description: 'Dry run (no issues created)'
        required: false
        type: boolean
        default: false
      sources:
        description: 'Comma-separated sources to enable (empty = use config file). Options: github-issues,reddit,stackoverflow,github-discussions'
        required: false
      force_rescan:
        description: 'Ignore search state and re-search everything'
        required: false
        type: boolean
        default: false
      max_issues:
        description: 'Max Copilot issues to create per run'
        required: false
        default: '10'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # Compute batch matrix from total project count
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.calc.outputs.matrix }}
      batch_count: ${{ steps.calc.outputs.batch_count }}
      is_targeted: ${{ steps.calc.outputs.is_targeted }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Calculate batches
        id: calc
        run: |
          BATCH_SIZE=${{ inputs.batch_size || '20' }}
          TARGET="${{ inputs.projects || '' }}"

          if [ -n "$TARGET" ]; then
            echo "is_targeted=true" >> $GITHUB_OUTPUT
            echo 'matrix={"batch":[0]}' >> $GITHUB_OUTPUT
            echo "batch_count=1" >> $GITHUB_OUTPUT
          else
            TOTAL=$(node -e "Promise.all([import('./scripts/cncf-projects.mjs'), import('./scripts/other-projects.mjs')]).then(([c, o]) => console.log(c.CNCF_PROJECTS.length + o.OTHER_PROJECTS.length))")
            BATCHES=$(( (TOTAL + BATCH_SIZE - 1) / BATCH_SIZE ))
            INDICES=$(node -e "console.log(JSON.stringify({batch: Array.from({length: $BATCHES}, (_, i) => i)}))")
            echo "matrix=$INDICES" >> $GITHUB_OUTPUT
            echo "batch_count=$BATCHES" >> $GITHUB_OUTPUT
            echo "is_targeted=false" >> $GITHUB_OUTPUT
            echo "Total projects: $TOTAL, batch size: $BATCH_SIZE, batches: $BATCHES"
          fi

  generate:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
      max-parallel: 3
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm install --no-audit
      - name: Discover issues and create Copilot tasks (batch ${{ matrix.batch }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPILOT_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          MIN_REACTIONS: ${{ inputs.min_reactions || '10' }}
          TARGET_PROJECTS: ${{ inputs.projects || '' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          BATCH_INDEX: ${{ needs.plan.outputs.is_targeted == 'true' && '' || matrix.batch }}
          BATCH_SIZE: ${{ inputs.batch_size || '20' }}
          ENABLED_SOURCES: ${{ inputs.sources || '' }}
          FORCE_RESCAN: ${{ inputs.force_rescan || 'false' }}
          MAX_COPILOT_ISSUES: ${{ inputs.max_issues || '10' }}
        run: node scripts/generate-cncf-missions.mjs
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: report-batch-${{ matrix.batch }}
          path: |
            generation-report*.md
            search-state.json
          if-no-files-found: ignore

  collect:
    needs: [plan, generate]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all batch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: report-batch-*
          merge-multiple: true
      - name: Merge reports
        run: |
          echo "# CNCF Mission Generation Report (All Batches)" > generation-report.md
          echo "" >> generation-report.md
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> generation-report.md
          echo "**Batches:** ${{ needs.plan.outputs.batch_count }}" >> generation-report.md
          echo "" >> generation-report.md
          for f in generation-report-*.md; do
            if [ -f "$f" ]; then
              echo "---" >> generation-report.md
              echo "## Batch: $f" >> generation-report.md
              cat "$f" >> generation-report.md
              echo "" >> generation-report.md
            fi
          done
      - name: Merge search state files
        run: |
          # Deep merge search-state.json files from each batch by project key
          node -e "
            const fs = require('fs');
            const merged = { version: 1, lastUpdated: new Date().toISOString(), projects: {} };
            if (fs.existsSync('search-state.json')) {
              try { Object.assign(merged, JSON.parse(fs.readFileSync('search-state.json', 'utf8'))); } catch {}
            }
            const batchStates = fs.readdirSync('.').filter(f => f.match(/search-state-\d+\.json/));
            for (const f of batchStates) {
              try {
                const batch = JSON.parse(fs.readFileSync(f, 'utf8'));
                for (const [repo, sources] of Object.entries(batch.projects || {})) {
                  if (!merged.projects[repo]) merged.projects[repo] = {};
                  for (const [srcId, srcData] of Object.entries(sources)) {
                    const existing = merged.projects[repo][srcId] || { processedIds: [] };
                    existing.lastSearched = srcData.lastSearched || existing.lastSearched;
                    existing.cursor = srcData.cursor || existing.cursor;
                    const ids = new Set([...(existing.processedIds || []), ...(srcData.processedIds || [])]);
                    existing.processedIds = [...ids];
                    merged.projects[repo][srcId] = existing;
                  }
                }
              } catch (e) { console.warn('Error merging ' + f + ': ' + e.message); }
            }
            merged.lastUpdated = new Date().toISOString();
            fs.writeFileSync('search-state.json', JSON.stringify(merged, null, 2));
            console.log('Merged search state: ' + Object.keys(merged.projects).length + ' projects');
          "
      - name: Commit search state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f search-state.json ] && ! git diff --quiet search-state.json 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add search-state.json
            git commit -s -m "🌱 Update CNCF mission search state ($(date +%Y-%m-%d))"
            git push origin master
          fi
      - name: Write workflow summary
        run: |
          echo "## 🌱 CNCF Mission Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Batches | ${{ needs.plan.outputs.batch_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f generation-report.md ]; then
            ISSUES_CREATED=$(grep -o 'Copilot issues created: [0-9]*' generation-report.md | head -1 | grep -o '[0-9]*' || echo "0")
            echo "| Copilot issues created | $ISSUES_CREATED |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Copilot coding agent will create PRs for each issue." >> $GITHUB_STEP_SUMMARY
