name: Generate CNCF Missions
on:
  schedule:
    - cron: '0 6 * * *'  # Daily 6am UTC
  workflow_dispatch:
    inputs:
      projects:
        description: 'Comma-separated CNCF project names (empty = all in batches)'
        required: false
      min_reactions:
        description: 'Minimum reactions threshold'
        required: false
        default: '10'
      batch_size:
        description: 'Projects per batch'
        required: false
        default: '20'
      dry_run:
        description: 'Dry run (no issues created)'
        required: false
        type: boolean
        default: false
      sources:
        description: 'Comma-separated sources to enable (empty = use config file). Options: github-issues,reddit,stackoverflow,github-discussions'
        required: false
      force_rescan:
        description: 'Ignore search state and re-search everything'
        required: false
        type: boolean
        default: false
      max_issues:
        description: 'Max Copilot issues to create per run'
        required: false
        default: '10'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # Compute batch matrix from total project count
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.calc.outputs.matrix }}
      batch_count: ${{ steps.calc.outputs.batch_count }}
      is_targeted: ${{ steps.calc.outputs.is_targeted }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Calculate batches
        id: calc
        run: |
          BATCH_SIZE=${{ inputs.batch_size || '20' }}
          TARGET="${{ inputs.projects || '' }}"

          if [ -n "$TARGET" ]; then
            echo "is_targeted=true" >> $GITHUB_OUTPUT
            echo 'matrix={"batch":[0]}' >> $GITHUB_OUTPUT
            echo "batch_count=1" >> $GITHUB_OUTPUT
          else
            TOTAL=$(node -e "Promise.all([import('./scripts/cncf-projects.mjs'), import('./scripts/other-projects.mjs')]).then(([c, o]) => console.log(c.CNCF_PROJECTS.length + o.OTHER_PROJECTS.length))")
            BATCHES=$(( (TOTAL + BATCH_SIZE - 1) / BATCH_SIZE ))
            INDICES=$(node -e "console.log(JSON.stringify({batch: Array.from({length: $BATCHES}, (_, i) => i)}))")
            echo "matrix=$INDICES" >> $GITHUB_OUTPUT
            echo "batch_count=$BATCHES" >> $GITHUB_OUTPUT
            echo "is_targeted=false" >> $GITHUB_OUTPUT
            echo "Total projects: $TOTAL, batch size: $BATCH_SIZE, batches: $BATCHES"
          fi

  generate:
    needs: plan
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}
      max-parallel: 3
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm install --no-audit
      - name: Discover issues and create Copilot tasks (batch ${{ matrix.batch }})
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TOKEN: ${{ secrets.ORG_TOKEN }}
          MIN_REACTIONS: ${{ inputs.min_reactions || '10' }}
          TARGET_PROJECTS: ${{ inputs.projects || '' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          BATCH_INDEX: ${{ needs.plan.outputs.is_targeted == 'true' && '' || matrix.batch }}
          BATCH_SIZE: ${{ inputs.batch_size || '20' }}
          ENABLED_SOURCES: ${{ inputs.sources || '' }}
          FORCE_RESCAN: ${{ inputs.force_rescan || 'false' }}
          MAX_COPILOT_ISSUES: ${{ inputs.max_issues || '10' }}
        run: node scripts/generate-cncf-missions.mjs
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: report-batch-${{ matrix.batch }}
          path: |
            generation-report*.md
            search-state.json
          if-no-files-found: ignore

  collect:
    needs: [plan, generate]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all batch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: report-batch-*
          merge-multiple: true
      - name: Merge reports
        run: |
          echo "# CNCF Mission Generation Report (All Batches)" > generation-report.md
          echo "" >> generation-report.md
          echo "**Date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> generation-report.md
          echo "**Batches:** ${{ needs.plan.outputs.batch_count }}" >> generation-report.md
          echo "" >> generation-report.md
          for f in generation-report-*.md; do
            if [ -f "$f" ]; then
              echo "---" >> generation-report.md
              echo "## Batch: $f" >> generation-report.md
              cat "$f" >> generation-report.md
              echo "" >> generation-report.md
            fi
          done
      - name: Merge search state files
        run: |
          # Deep merge search-state.json files from each batch by project key
          node -e "
            const fs = require('fs');
            const merged = { version: 1, lastUpdated: new Date().toISOString(), projects: {} };
            if (fs.existsSync('search-state.json')) {
              try { Object.assign(merged, JSON.parse(fs.readFileSync('search-state.json', 'utf8'))); } catch {}
            }
            const batchStates = fs.readdirSync('.').filter(f => f.match(/search-state-\d+\.json/));
            for (const f of batchStates) {
              try {
                const batch = JSON.parse(fs.readFileSync(f, 'utf8'));
                for (const [repo, sources] of Object.entries(batch.projects || {})) {
                  if (!merged.projects[repo]) merged.projects[repo] = {};
                  for (const [srcId, srcData] of Object.entries(sources)) {
                    const existing = merged.projects[repo][srcId] || { processedIds: [] };
                    existing.lastSearched = srcData.lastSearched || existing.lastSearched;
                    existing.cursor = srcData.cursor || existing.cursor;
                    const ids = new Set([...(existing.processedIds || []), ...(srcData.processedIds || [])]);
                    existing.processedIds = [...ids];
                    merged.projects[repo][srcId] = existing;
                  }
                }
              } catch (e) { console.warn('Error merging ' + f + ': ' + e.message); }
            }
            merged.lastUpdated = new Date().toISOString();
            fs.writeFileSync('search-state.json', JSON.stringify(merged, null, 2));
            console.log('Merged search state: ' + Object.keys(merged.projects).length + ' projects');
          "
      - name: Commit search state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f search-state.json ] && ! git diff --quiet search-state.json 2>/dev/null; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            # Stage and stash first — git rebase requires a clean working tree.
            # The previous step writes search-state.json as an unstaged change;
            # rebasing with unstaged changes causes "cannot rebase: You have
            # unstaged changes" (exit 128).
            git add search-state.json
            git stash

            # Retry loop handles concurrent push conflicts from parallel batch runs
            MAX_RETRIES=3
            for attempt in $(seq 1 $MAX_RETRIES); do
              git fetch origin master
              git rebase origin/master || {
                echo "Rebase failed on attempt $attempt, aborting and retrying..."
                git rebase --abort || true
                sleep 2
                continue
              }
              git stash pop || true
              git add search-state.json
              git diff --cached --quiet && { echo "No changes after rebase"; break; }
              git commit -s -m "🌱 Update CNCF mission search state ($(date +%Y-%m-%d))" || true
              if git push origin master; then
                echo "Search state pushed (attempt $attempt)"
                break
              fi
              echo "Push failed (attempt $attempt/$MAX_RETRIES), retrying..."
              # Undo the commit so next iteration can retry after fetching
              git reset --soft HEAD~1 2>/dev/null || true
              git stash
              sleep 2
            done
          fi
      - name: Write workflow summary
        run: |
          echo "## 🌱 CNCF Mission Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Batches | ${{ needs.plan.outputs.batch_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f generation-report.md ]; then
            ISSUES_CREATED=$(grep -o 'Copilot issues created: [0-9]*' generation-report.md | head -1 | grep -o '[0-9]*' || echo "0")
            echo "| Copilot issues created | $ISSUES_CREATED |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Auto-merge will score and merge passing missions." >> $GITHUB_STEP_SUMMARY

  auto-merge:
    needs: [generate, collect]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm install --no-audit
      - name: Score and auto-merge passing mission PRs
        env:
          GH_TOKEN: ${{ secrets.ORG_TOKEN }}
          QUALITY_THRESHOLD: '70'
        run: |
          node -e "
            const { execSync } = require('child_process');

            const QUALITY_THRESHOLD = parseInt(process.env.QUALITY_THRESHOLD || '70', 10);
            const LABEL = 'cncf-mission-gen';
            const LOOKBACK_HOURS = 6;

            async function main() {
              // Find open PRs with the cncf-mission-gen label created recently
              const since = new Date(Date.now() - LOOKBACK_HOURS * 60 * 60 * 1000).toISOString();
              const prsJson = execSync(
                \`gh pr list --label \${LABEL} --state open --json number,headRefName,title,createdAt --limit 50\`,
                { encoding: 'utf8' }
              );
              const prs = JSON.parse(prsJson);
              const recentPrs = prs.filter(pr => new Date(pr.createdAt) >= new Date(since));

              console.log(\`Found \${recentPrs.length} recent mission PRs (last \${LOOKBACK_HOURS}h)\`);
              if (!recentPrs.length) return;

              // Dynamic import for ESM scorer
              const { scoreMission } = await import('./scripts/quality-scorer.mjs');

              let merged = 0;
              let failed = 0;

              for (const pr of recentPrs) {
                try {
                  // List changed files in the PR to find the mission JSON
                  const filesJson = execSync(
                    \`gh pr diff \${pr.number} --name-only\`,
                    { encoding: 'utf8' }
                  );
                  const missionFile = filesJson.trim().split('\\n').find(f =>
                    f.startsWith('solutions/') && f.endsWith('.json') && !f.endsWith('index.json')
                  );

                  if (!missionFile) {
                    console.log(\`PR #\${pr.number}: no mission JSON found, skipping\`);
                    continue;
                  }

                  // Fetch the file content from the PR branch
                  const content = execSync(
                    \`gh api repos/{owner}/{repo}/contents/\${encodeURIComponent(missionFile)}?ref=\${pr.headRefName} --jq '.content'\`,
                    { encoding: 'utf8' }
                  );
                  const mission = JSON.parse(Buffer.from(content.trim(), 'base64').toString('utf8'));

                  // Score the mission
                  const result = scoreMission(mission, QUALITY_THRESHOLD);
                  console.log(\`PR #\${pr.number} (\${pr.title}): score=\${result.score}/100 pass=\${result.pass}\`);
                  console.log(\`  Breakdown: \${JSON.stringify(result.breakdown)}\`);

                  if (result.pass) {
                    // Add score comment before merging
                    execSync(
                      \`gh pr comment \${pr.number} --body \"Auto-merge: quality score \${result.score}/100 (threshold: \${QUALITY_THRESHOLD}). Breakdown: \${JSON.stringify(result.breakdown)}\"\`,
                      { encoding: 'utf8' }
                    );
                    // Merge the PR
                    execSync(
                      \`gh pr merge \${pr.number} --squash --admin --delete-branch\`,
                      { encoding: 'utf8' }
                    );
                    console.log(\`  -> Merged PR #\${pr.number}\`);
                    merged++;
                  } else {
                    // Add comment explaining why it didn't pass
                    execSync(
                      \`gh pr comment \${pr.number} --body \"Quality score \${result.score}/100 — below threshold (\${QUALITY_THRESHOLD}). Needs manual review. Breakdown: \${JSON.stringify(result.breakdown)}\"\`,
                      { encoding: 'utf8' }
                    );
                    console.log(\`  -> Below threshold, left open for review\`);
                    failed++;
                  }
                } catch (err) {
                  console.error(\`PR #\${pr.number}: error - \${err.message}\`);
                  failed++;
                }
              }

              console.log(\`\\nDone: \${merged} merged, \${failed} left for review\`);
            }

            main().catch(err => { console.error(err); process.exit(1); });
          "
      - name: Update workflow summary with merge results
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Auto-Merge Results" >> $GITHUB_STEP_SUMMARY
          echo "See job logs for per-PR scoring details." >> $GITHUB_STEP_SUMMARY
