name: Scan Mission Files
on:
  pull_request:
    branches: [master]
    paths: ['fixes/**']
  push:
    branches: [master]
    paths:
      - 'fixes/**'
      - '!fixes/index.json'
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6:00am UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: cd scripts && npm install --no-audit
      - name: Find changed files (PR only)
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'fixes/**/*.json' 'fixes/**/*.yaml' 'fixes/**/*.yml' | tr '\n' ' ')
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "count=$(echo $FILES | wc -w | tr -d ' ')" >> $GITHUB_OUTPUT
      - name: Scan missions (PR — changed files only)
        if: github.event_name == 'pull_request' && steps.changed.outputs.count != '0'
        run: node scripts/scan-pr.mjs ${{ steps.changed.outputs.files }}
      - name: Scan missions (push/schedule/dispatch — all files)
        if: github.event_name != 'pull_request'
        run: node scripts/scan-pr.mjs --all
      - name: Post results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('scan-results.md')) {
              const body = fs.readFileSync('scan-results.md', 'utf8');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }
