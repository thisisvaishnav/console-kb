# Install Mission Knowledge Sources Configuration
# Controls which sources the CNCF install mission generator crawls.

sources:
  official-docs:
    enabled: true
    description: "Official project documentation (install/getting-started pages)"
    paths:
      - "/docs/install"
      - "/docs/getting-started"
      - "/docs/setup"
      - "/docs/quickstart"
      - "/docs/deployment"
    maxPages: 3
    timeout: 15000

  repo-readme:
    enabled: true
    description: "Repository README.md — quick install commands, badges, prereqs"
    # Fetched via GitHub API (raw content)

  helm-charts:
    enabled: true
    description: "Helm charts — values.yaml, Chart.yaml, templates"
    chartPaths:
      - "charts/"
      - "deploy/charts/"
      - "helm/"
      - "install/helm/"
    artifactHubFallback: true
    timeout: 15000

  container-images:
    enabled: true
    description: "Container images — Dockerfile, registry, tags, multi-arch"
    registries:
      - "ghcr.io"
      - "docker.io"
      - "quay.io"
      - "registry.k8s.io"
    dockerfilePaths:
      - "Dockerfile"
      - "build/Dockerfile"
      - "docker/Dockerfile"

  common-configs:
    enabled: true
    description: "Common configurations — examples, RBAC, TLS, resource limits"
    configPaths:
      - "examples/"
      - "config/"
      - "config/samples/"
      - "deploy/examples/"
      - "docs/examples/"

  kubectl-manifests:
    enabled: true
    description: "Kustomize / kubectl manifests — deploy/, release assets, CRDs"
    manifestPaths:
      - "deploy/"
      - "install/"
      - "manifests/"
      - "config/crd/"
      - "config/manager/"

# Quality gate thresholds
quality:
  minScore: 60
  draftMinScore: 40
  batchAvgMinScore: 50
  batchFailRateMax: 0.30

# Install method priority (highest to lowest)
installMethodPriority:
  - helm
  - operator
  - kustomize
  - kubectl
  - docker

# Author attribution for auto-generated missions
author:
  name: "KubeStellar Bot"
  github: "kubestellar"
